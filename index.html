<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JLPT 단어">
  <meta name="theme-color" content="#7F77DD">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>JLPT 단어 학습</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    /* ── 색상 변수 ── */
    :root{
      --bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
      --text:#1a1a1a;--text2:#555;--text3:#999;
      --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
      --r:12px;--r-sm:8px;
      --purple:#7F77DD;--purple-d:#534AB7;
      --n1-bg:#EEEDFE;--n1-c:#3C3489;
      --n2-bg:#E1F5EE;--n2-c:#085041;--n2-b:#1D9E75;
      --n3-bg:#FAEEDA;--n3-c:#633806;
      --kw-bg:#FBEAF0;--kw-c:#72243E;
      --coral-bg:#FAECE7;--coral-b:#D85A30;--coral-c:#993C1D;
      --hl-bg:#EEEDFE;--hl-border:#7F77DD;--hl-ch:#3C3489;--hl-rm:#534AB7;

      /* ── 가나표 반응형 변수 (데스크탑 기준) ── */
      --kana-cell:   clamp(36px, 4.2vw, 60px);
      --kana-char:   clamp(14px, 1.6vw, 24px);
      --kana-romaji: clamp(8px,  0.75vw, 11px);
      --kana-gap:    clamp(2px,  0.4vw,  6px);
      --kana-pad:    clamp(3px,  0.5vw,  7px);
      --kana-label:  clamp(8px,  0.7vw,  11px);
    }
    /* System dark mode (only when no forced theme) */
    @media(prefers-color-scheme:dark){
      html:not([data-theme="light"]){
        --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
        --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
        --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
        --n1-bg:#2e2b5a;--n1-c:#b0abf0;
        --n2-bg:#0f3028;--n2-c:#5dcaa5;
        --n3-bg:#3a2a0a;--n3-c:#f0b955;
        --kw-bg:#3a1a2a;--kw-c:#ed93b1;
        --coral-bg:#3a1a0a;--coral-c:#f0886a;
        --hl-bg:#2e2b5a;--hl-border:#7F77DD;--hl-ch:#b0abf0;--hl-rm:#7F77DD;
      }
    }
    /* Force dark */
    html[data-theme="dark"]{
      --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
        --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
        --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
        --n1-bg:#2e2b5a;--n1-c:#b0abf0;
        --n2-bg:#0f3028;--n2-c:#5dcaa5;
        --n3-bg:#3a2a0a;--n3-c:#f0b955;
        --kw-bg:#3a1a2a;--kw-c:#ed93b1;
        --coral-bg:#3a1a0a;--coral-c:#f0886a;
        --hl-bg:#2e2b5a;--hl-border:#7F77DD;--hl-ch:#b0abf0;--hl-rm:#7F77DD;
    }

    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}

    /* ── 공통 컴포넌트 ── */
    .lv-badge{font-size:11px;padding:3px 12px;border-radius:20px;margin-bottom:14px;font-weight:600;display:inline-block}

    /* ── 가나표 공통 ── */
    .kana-group{margin-bottom:var(--kana-gap)}
    .kana-label{
      font-size:var(--kana-label);
      color:var(--text3);margin-bottom:2px;
      font-weight:600;letter-spacing:.5px;text-transform:uppercase
    }
    .kana-row{
      display:grid;
      grid-template-columns:repeat(5, var(--kana-cell));
      gap:var(--kana-gap);
      padding-bottom:2px;
    }
    .kc{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:var(--kana-cell);height:var(--kana-cell);
      padding:var(--kana-pad) 1px;
      border-radius:clamp(4px,0.5vw,8px);
      border:0.5px solid var(--border);
      background:var(--bg2);
      transition:background .15s,border-color .15s;
    }
    .kc .ch{font-size:var(--kana-char);color:var(--text);line-height:1.2}
    .kc .rm{font-size:var(--kana-romaji);color:var(--text3);margin-top:1px}
    .kc.empty{border:none;background:transparent}
    .kc.hl{background:var(--hl-bg);border-color:var(--hl-border);border-width:1px}
    .kc.hl .ch{color:var(--hl-ch);font-weight:700}
    .kc.hl .rm{color:var(--hl-rm)}

    .ktab-row{display:flex;gap:5px;margin-bottom:8px}
    .ktab{flex:1;padding:6px;font-size:12px;cursor:pointer;border:0.5px solid var(--border2);border-radius:var(--r-sm);background:transparent;color:var(--text2);min-height:32px}
    .ktab.on{background:var(--n1-bg);color:var(--n1-c);border-color:transparent}

    .lv-btn{padding:6px 12px;font-size:12px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2)}
    .lv-btn.n1.on{background:var(--n1-bg);color:var(--n1-c);border-color:transparent}
    .lv-btn.n2.on{background:var(--n2-bg);color:var(--n2-c);border-color:transparent}
    .lv-btn.n3.on{background:var(--n3-bg);color:var(--n3-c);border-color:transparent}
    .lv-btn.kw.on{background:var(--kw-bg);color:var(--kw-c);border-color:transparent}

    .prog-bar{flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;background:var(--purple);transition:width .3s}
    .prog-txt{font-size:12px;color:var(--text3);white-space:nowrap;min-width:52px;text-align:right}

    .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px 38px;position:relative;cursor:pointer;user-select:none;-webkit-user-select:none}
    .card:active{background:var(--bg2)}

    .reveal-btn{background:var(--purple);color:#fff;border:none;font-weight:600;cursor:pointer;border-radius:var(--r)}
    .reveal-btn:active{background:var(--purple-d)}
    .know-btn{border:1.5px solid var(--n2-b);color:var(--n2-c);background:transparent;cursor:pointer;border-radius:var(--r);font-weight:500}
    .know-btn:active{background:var(--n2-bg)}
    .dont-btn{border:1.5px solid var(--coral-b);color:var(--coral-c);background:transparent;cursor:pointer;border-radius:var(--r);font-weight:500}
    .dont-btn:active{background:var(--coral-bg)}
    .nav-btn{border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;border-radius:var(--r-sm)}
    .nav-btn:active,.shuffle-btn:active{background:var(--bg2)}
    .shuffle-btn{border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;border-radius:20px}
    .stat-card{background:var(--bg2);border-radius:var(--r-sm);text-align:center}
    .stat-label{font-size:11px;color:var(--text3)}
    .stat-val{font-weight:600;color:var(--text)}

    /* ══ 데스크탑 레이아웃 ══ */
    @media(min-width:768px){
      #mobile-layout{display:none}

      #desktop-layout{
        display:flex;
        gap:clamp(10px,1.2vw,20px);
        padding:clamp(12px,1.4vw,20px);
        height:100vh;
        min-height:500px;
      }

      /* 왼쪽 가나표 패널: vw 기반 + clamp로 max 제한 */
      #d-left{
        width:clamp(200px, 28vw, 400px);
        flex-shrink:0;
        display:flex;
        flex-direction:column;
      }
      #d-kana{
        flex:1;
        background:var(--bg);
        border:0.5px solid var(--border);
        border-radius:var(--r);
        padding:clamp(8px,1vw,14px);
        overflow-y:auto;
        overflow-x:hidden;
        max-height:calc(100vh - clamp(24px,2.8vw,40px));
      }
      #d-kana::-webkit-scrollbar{width:4px}
      #d-kana::-webkit-scrollbar-track{background:transparent}
      #d-kana::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

      /* 오른쪽 콘텐츠 */
      #d-right{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
      #d-topbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
      #d-topbar .lv-label{font-size:13px;color:var(--text2);font-weight:500}
      #d-prog-row{display:flex;align-items:center;gap:8px}
      #d-card{flex:1;min-height:200px}
      #d-btn-row{display:flex;align-items:center;gap:8px}
      #d-reveal{padding:10px 24px;font-size:15px;min-height:44px}
      #d-know,#d-dont{padding:10px 18px;font-size:14px;min-height:44px}
      #d-prev,#d-next{padding:9px 16px;font-size:13px;min-height:44px}
      #d-shuffle{padding:6px 13px;font-size:12px}
      #d-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      #d-stats .stat-card{padding:8px 10px}
      #d-stats .stat-val{font-size:20px}
    }

    /* ══ 모바일 레이아웃 ══ */
    @media(max-width:767px){
      /* 모바일에서는 작은 고정 크기 사용 */
      :root{
        --kana-cell:   clamp(34px, 17vw, 52px);
        --kana-char:   clamp(13px, 4vw,  18px);
        --kana-romaji: clamp(7px,  2.2vw, 9px);
        --kana-gap:    clamp(2px,  1vw,   4px);
        --kana-pad:    clamp(2px,  1vw,   5px);
        --kana-label:  8px;
      }

      #desktop-layout{display:none}
      #mobile-layout{
        display:flex;flex-direction:column;gap:10px;
        padding:14px;
        padding-top:max(14px,env(safe-area-inset-top));
        padding-bottom:max(14px,env(safe-area-inset-bottom));
      }
      #m-topbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
      #m-prog-row{display:flex;align-items:center;gap:8px}
      #m-card{min-height:200px}
      #m-reveal{width:100%;padding:14px;font-size:16px;min-height:50px}

      #m-kana-panel{
        display:none;
        background:var(--bg);
        border:0.5px solid var(--border);
        border-radius:var(--r);
        padding:10px;
        overflow-x:hidden;
      }
      #m-kana-panel.open{display:block}

      /* 모바일 가나표: 5칸 균등 그리드로 자동 꽉 채움 */
      #m-kana-panel .kana-row{
        display:grid;
        grid-template-columns:repeat(5,1fr);
        gap:var(--kana-gap);
      }
      #m-kana-panel .kc{
        width:100%;height:auto;
        aspect-ratio:1/1;
      }

      #m-action-row{display:none;grid-template-columns:1fr 1fr;gap:8px}
      #m-know,#m-dont{padding:13px;font-size:15px;min-height:50px}
      #m-nav-row{display:flex;gap:8px}
      #m-prev,#m-next,#m-shuffle{flex:1;padding:11px;font-size:13px;min-height:44px}
      #m-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
      #m-stats .stat-card{padding:8px 4px}
      #m-stats .stat-val{font-size:18px}
      #m-stats .stat-label{font-size:10px}
    }

    /* ── N4 / N5 level colours ── */
    .lv-btn.n4.on{background:#E8F4FD;color:#1A5276;border-color:transparent}
    .lv-btn.n5.on{background:#E9F7EF;color:#1E8449;border-color:transparent}

    /* ── Theme toggle ── */
    .theme-btn{padding:5px 10px;font-size:12px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2)}
    .theme-btn.on{background:var(--n1-bg);color:var(--n1-c);border-color:transparent}

    /* ── Search bar ── */
    .search-wrap{position:relative;display:flex;align-items:center}
    .search-wrap input{
      padding:5px 28px 5px 10px;font-size:12px;
      border:0.5px solid var(--border2);border-radius:20px;
      background:var(--bg2);color:var(--text);outline:none;
      width:clamp(100px,14vw,200px);
    }
    .search-wrap input::placeholder{color:var(--text3)}
    .search-wrap input:focus{border-color:var(--purple)}
    .search-clear{position:absolute;right:8px;font-size:14px;cursor:pointer;color:var(--text3);display:none}
    .search-clear.show{display:block}

    /* ── Review mode banner ── */
    .review-banner{
      display:none;padding:7px 12px;border-radius:var(--r-sm);
      background:#FFF3CD;color:#856404;font-size:12px;font-weight:500;
      border:0.5px solid #FFD95A;align-items:center;gap:8px;
    }
    .review-banner.show{display:flex}
    .review-exit{margin-left:auto;padding:4px 10px;font-size:11px;border:0.5px solid #856404;border-radius:20px;cursor:pointer;background:transparent;color:#856404}
    @media(prefers-color-scheme:dark){
      .review-banner{background:#3a2e00;color:#f0c040;border-color:#6a5200}
      .review-exit{border-color:#f0c040;color:#f0c040}
    }
    html[data-theme="dark"] .review-banner{background:#3a2e00;color:#f0c040;border-color:#6a5200}
    html[data-theme="dark"] .review-exit{border-color:#f0c040;color:#f0c040}

    /* ── TTS button on card ── */
    .tts-btn{
      position:absolute;bottom:12px;right:14px;
      font-size:18px;background:none;border:none;cursor:pointer;
      opacity:0.25;pointer-events:none;transition:opacity .2s;
      padding:4px;border-radius:50%;
    }
    .tts-btn.active{opacity:1;pointer-events:auto}
    .tts-btn.active:hover{background:var(--bg3)}

    /* ── Timer in stat card ── */
    .timer-val{font-size:15px;font-weight:600;color:var(--purple);font-variant-numeric:tabular-nums;letter-spacing:1px}
  </style>
</head>
<body>

<div id="desktop-layout">
  <div id="d-left">
    <div id="d-kana">
      <div class="ktab-row">
        <button class="ktab on" onclick="showKana('hira','d',this)">ひらがな</button>
        <button class="ktab" onclick="showKana('kata','d',this)">カタカナ</button>
      </div>
      <div id="d-kana-content"></div>
    </div>
  </div>
  <div id="d-right">
    <div id="d-review-banner" class="review-banner">
      <span id="d-review-txt">📝 오답 복습 모드</span>
      <button class="review-exit" onclick="exitReviewMode()">✕ 복습 종료</button>
    </div>
    <div id="d-topbar">
      <span class="lv-label">레벨</span>
      <button class="lv-btn n1 on" onclick="toggleLv('N1',this)">N1</button>
      <button class="lv-btn n2 on" onclick="toggleLv('N2',this)">N2</button>
      <button class="lv-btn n3 on" onclick="toggleLv('N3',this)">N3</button>
      <button class="lv-btn n4 on" onclick="toggleLv('N4',this)">N4</button>
      <button class="lv-btn n5 on" onclick="toggleLv('N5',this)">N5</button>
      <button class="lv-btn kw on" onclick="toggleLv('회화',this)">회화</button>
      <button class="shuffle-btn" id="d-shuffle" onclick="doShuffle()" style="margin-left:auto;padding:6px 10px;font-size:12px">셔플 ↺</button>
      <button class="shuffle-btn" onclick="enterReviewMode()" style="padding:6px 10px;font-size:12px;border-color:var(--coral-b);color:var(--coral-c)">오답복습</button>
    </div>
    <div id="d-search-row" style="display:flex;align-items:center;gap:8px">
      <div class="search-wrap">
        <input id="d-search" type="text" placeholder="🔍 단어/읽기/뜻 검색..." oninput="handleSearch(this.value,'d')">
        <span class="search-clear" id="d-search-clear" onclick="clearSearch('d')">✕</span>
      </div>
      <span style="margin-left:auto;font-size:11px;color:var(--text3)">테마</span>
      <button class="theme-btn on" id="th-sys" onclick="setTheme('system',this)">💻 시스템</button>
      <button class="theme-btn" id="th-light" onclick="setTheme('light',this)">☀️ 라이트</button>
      <button class="theme-btn" id="th-dark" onclick="setTheme('dark',this)">🌙 다크</button>
    </div>
    <div id="d-prog-row">
      <div class="prog-bar"><div class="prog-fill" id="d-prog-fill" style="width:0%"></div></div>
      <div class="prog-txt" id="d-prog-txt">0 / 0</div>
    </div>
    <div class="card" id="d-card" onclick="onTap('d')"></div>
    <div id="d-btn-row">
      <button class="nav-btn" id="d-prev" onclick="go(-1)">← 이전</button>
      <button class="reveal-btn" id="d-reveal" onclick="reveal()">정답 확인</button>
      <button class="know-btn" id="d-know" onclick="mark(true)" style="display:none">✓ 알아요</button>
      <button class="dont-btn" id="d-dont" onclick="mark(false)" style="display:none">✗ 몰라요</button>
      <button class="nav-btn" id="d-next" style="margin-left:auto" onclick="go(1)">다음 →</button>
    </div>
    <div id="d-stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card"><div class="stat-label">알아요</div><div class="stat-val" id="d-sv-know" style="color:#1D9E75">0</div></div>
      <div class="stat-card"><div class="stat-label">몰라요</div><div class="stat-val" id="d-sv-dont" style="color:#D85A30">0</div></div>
      <div class="stat-card"><div class="stat-label">남은 단어</div><div class="stat-val" id="d-sv-left">0</div></div>
      <div class="stat-card"><div class="stat-label">전체</div><div class="stat-val" id="d-sv-total" style="color:var(--text3)">0</div></div>
      <div class="stat-card"><div class="stat-label">순공시간</div><div class="timer-val" id="d-sv-timer">00:00:00</div></div>
    </div>
  </div>
</div>

<div id="mobile-layout">
  <div id="m-review-banner" class="review-banner">
    <span id="m-review-txt">📝 오답 복습 모드</span>
    <button class="review-exit" onclick="exitReviewMode()">✕ 복습 종료</button>
  </div>
  <div id="m-topbar" style="gap:4px">
    <button class="lv-btn n1 on" onclick="toggleLv('N1',this)" style="padding:5px 8px;font-size:11px">N1</button>
    <button class="lv-btn n2 on" onclick="toggleLv('N2',this)" style="padding:5px 8px;font-size:11px">N2</button>
    <button class="lv-btn n3 on" onclick="toggleLv('N3',this)" style="padding:5px 8px;font-size:11px">N3</button>
    <button class="lv-btn n4 on" onclick="toggleLv('N4',this)" style="padding:5px 8px;font-size:11px">N4</button>
    <button class="lv-btn n5 on" onclick="toggleLv('N5',this)" style="padding:5px 8px;font-size:11px">N5</button>
    <button class="lv-btn kw on" onclick="toggleLv('회화',this)" style="padding:5px 8px;font-size:11px">회화</button>
    <button class="shuffle-btn" onclick="doShuffle()" style="margin-left:auto;padding:6px 10px;font-size:12px;min-height:32px">↺</button>
    <button class="shuffle-btn" onclick="enterReviewMode()" style="padding:6px 8px;font-size:11px;min-height:32px;border-color:var(--coral-b);color:var(--coral-c)">오답복습</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="search-wrap" style="flex:1">
      <input id="m-search" type="text" placeholder="🔍 검색..." oninput="handleSearch(this.value,'m')" style="width:100%">
      <span class="search-clear" id="m-search-clear" onclick="clearSearch('m')">✕</span>
    </div>
    <button class="theme-btn" id="m-th-sys" onclick="setTheme('system',this)">💻</button>
    <button class="theme-btn" id="m-th-light" onclick="setTheme('light',this)">☀️</button>
    <button class="theme-btn" id="m-th-dark" onclick="setTheme('dark',this)">🌙</button>
  </div>
  <div id="m-prog-row">
    <div class="prog-bar"><div class="prog-fill" id="m-prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="m-prog-txt">0 / 0</div>
  </div>
  <div class="card" id="m-card" onclick="onTap('m')"></div>
  <button class="reveal-btn" id="m-reveal" onclick="reveal()">정답 확인</button>
  <div id="m-kana-panel">

// ════ Learning records ════
let wrongSet=new Set(LS.get('wrong_set')||[]);
let knownSet=new Set(LS.get('known_set')||[]);
function wordKey(w){return w.w+'_'+w.lv}
function saveRecord(w,know){
  const k=wordKey(w);
  if(know){knownSet.add(k);wrongSet.delete(k);}
  else{wrongSet.add(k);knownSet.delete(k);}
  LS.set('wrong_set',[...wrongSet]);
  LS.set('known_set',[...knownSet]);
}

// ════ TTS ════
const ttsOK='speechSynthesis' in window;
function speak(text){
  if(!ttsOK||!isRevealed)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.9;
  speechSynthesis.speak(u);
}

// ════ Theme ════
function applyTheme(mode){
  const h=document.documentElement;
  if(mode==='dark')h.setAttribute('data-theme','dark');
  else if(mode==='light')h.setAttribute('data-theme','light');
  else h.removeAttribute('data-theme');
  [['th-sys','system'],['th-light','light'],['th-dark','dark']].forEach(([id,val])=>{
    ['','m-'].forEach(p=>{const el=document.getElementById(p+id);if(el)el.classList.toggle('on',val===mode);});
  });
  LS.set('theme',mode);
}
function setTheme(mode){applyTheme(mode);}
applyTheme(LS.get('theme')||'system');

// ════ Session timer (not persisted) ════
let timerSec=0,timerRunning=false,timerInt=null;
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return[h,m,ss].map(n=>String(n).padStart(2,'0')).join(':');}
function tickTimer(){timerSec++;['d','m'].forEach(s=>{const e=document.getElementById(s+'-sv-timer');if(e)e.textContent=fmtTime(timerSec);});}
function startTimer(){if(!timerRunning){timerRunning=true;timerInt=setInterval(tickTimer,1000);}}
function stopTimer(){timerRunning=false;clearInterval(timerInt);}
document.addEventListener('visibilitychange',()=>{document.visibilityState==='hidden'?stopTimer():startTimer();});
startTimer();

// ════ Kana ════
function hiraToKata(set){
  const out=new Set();
  set.forEach(ch=>{const code=ch.charCodeAt(0);if(code>=0x3041&&code<=0x3096)out.add(String.fromCharCode(code+0x60));else out.add(ch);});
  return out;
}
function buildKana(rows,hl){
  return rows.map(row=>`
    <div class="kana-group">
      ${row.t?`<div class="kana-label">${row.t}</div>`:''}
      <div class="kana-row">
        ${row.c.map(([ch,rm])=>{
          if(!ch||!ch.trim())return`<div class="kc empty"></div>`;
          const h=hl&&hl.has(ch);
          return`<div class="kc${h?' hl':''}"><span class="ch">${ch}</span><span class="rm">${rm}</span></div>`;
        }).join('')}
      </div>
    </div>`).join('');
}
function showKana(mode,side,btn){
  kanaModes[side]=mode;
  const contentId=side==='d'?'d-kana-content':'m-kana-content';
  const panelSel=side==='d'?'#d-kana .ktab':'#m-kana-panel .ktab';
  document.querySelectorAll(panelSel).forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  else{const tabs=document.querySelectorAll(panelSel);if(tabs[mode==='hira'?0:1])tabs[mode==='hira'?0:1].classList.add('on');}
  const rows=mode==='hira'?HIRA:KATA;
  const hl=mode==='hira'?currentHighlights:hiraToKata(currentHighlights);
  document.getElementById(contentId).innerHTML=buildKana(rows,hl);
}
function rebuildKana(){showKana(kanaModes.d,'d',null);showKana(kanaModes.m,'m',null);}

// ════ Helpers ════
function $(id){return document.getElementById(id)}
function updateStats(){
  const left=Math.max(0,queue.length-idx);
  ['d','m'].forEach(s=>{
    $(`${s}-sv-know`).textContent=kn;
    $(`${s}-sv-dont`).textContent=dn;
    $(`${s}-sv-left`).textContent=left;
    $(`${s}-sv-total`).textContent=queue.length;
  });
}
function updateReviewBanner(){
  ['d','m'].forEach(s=>{const b=$(`${s}-review-banner`);if(b)b.classList.toggle('show',reviewMode);});
}

// ════ Search ════
function handleSearch(val,side){
  const other=side==='d'?'m':'d';
  const otherEl=document.getElementById(other+'-search');
  if(otherEl)otherEl.value=val;
  ['d','m'].forEach(s=>{const c=$(`${s}-search-clear`);if(c)c.classList.toggle('show',val.length>0);});
  searchQuery=val.trim().toLowerCase();
  if(!searchQuery){if(!reviewMode)doShuffle();return;}
  const pool=reviewMode
    ?vocab.filter(v=>wrongSet.has(wordKey(v))&&activeLv.has(v.lv))
    :vocab.filter(v=>activeLv.has(v.lv));
  queue=pool.filter(v=>v.w.includes(val.trim())||v.r.includes(val.trim())||v.m.toLowerCase().includes(searchQuery));
  idx=0;kn=0;dn=0;updateStats();renderCard();
}
function clearSearch(side){
  const el=document.getElementById(side+'-search');if(el)el.value='';
  const oEl=document.getElementById((side==='d'?'m':'d')+'-search');if(oEl)oEl.value='';
  handleSearch('',side);
}

// ════ Review mode ════
function enterReviewMode(){
  const pool=vocab.filter(v=>wrongSet.has(wordKey(v))&&activeLv.has(v.lv));
  if(pool.length===0){alert('복습할 단어가 없습니다.\n먼저 ✗ 몰라요를 체크해주세요!');return;}
  reviewMode=true;
  queue=pool.sort(()=>Math.random()-.5);
  idx=0;kn=0;dn=0;
  ['d','m'].forEach(s=>{const el=$(`${s}-review-txt`);if(el)el.textContent=`📝 오답 복습 모드 (${pool.length}개)`;});
  updateReviewBanner();updateStats();renderCard();
}
function exitReviewMode(){reviewMode=false;updateReviewBanner();doShuffle();}

// ════ Card render ════
function renderCard(){
  currentHighlights=new Set();
  rebuildKana();
  const total=queue.length;
  ['d','m'].forEach(s=>{
    $(`${s}-prog-txt`).textContent=`${Math.min(idx+1,total)} / ${total}`;
    $(`${s}-prog-fill`).style.width=total?Math.round((idx/total)*100)+'%':'0%';
  });
  updateStats();
  $('m-kana-panel').classList.remove('open');
  $('m-action-row').style.display='none';
  $('m-reveal').style.display='block';
  $('d-know').style.display='none';
  $('d-dont').style.display='none';
  $('d-reveal').style.display='inline-block';

  if(idx>=total){
    const emptyMsg=queue.length===0&&searchQuery?'검색 결과가 없습니다':reviewMode?'복습 완료! 🎉':'완료! 🎉';
    const btnLabel=reviewMode?'복습 종료':'다시 시작';
    const btnAct=reviewMode?'exitReviewMode()':'doShuffle()';
    const done=`<div style="text-align:center;padding:20px">
      <div style="font-size:34px;color:var(--text);margin-bottom:8px">${emptyMsg}</div>
      <div style="font-size:15px;color:var(--text2);margin-bottom:16px">알아요 ${kn}개 · 몰라요 ${dn}개</div>
      <button onclick="${btnAct}" style="padding:10px 22px;font-size:14px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text)">${btnLabel}</button>
    </div>`;
    $('d-card').innerHTML=done;$('m-card').innerHTML=done;
    $('d-reveal').style.display='none';$('m-reveal').style.display='none';
    return;
  }
  const w=queue[idx];const s=lvStyle[w.lv];
  const ttsDisabled=!ttsOK?'title="미지원 브라우저"':'';
  const cardHtml=`
    <div class="lv-badge" style="background:${s.bg};color:${s.c}">${w.lv}</div>
    <div style="font-size:52px;letter-spacing:4px;color:var(--text);text-align:center;line-height:1.2">${w.w}</div>
    <div class="reading-el" style="font-size:21px;color:var(--purple);margin-top:10px;text-align:center;display:none">${w.r}</div>
    <div class="meaning-el" style="font-size:16px;color:var(--text2);margin-top:5px;text-align:center;display:none">${w.m}</div>
    <div class="type-el" style="font-size:12px;color:var(--text3);margin-top:3px;display:none">[${w.t}]</div>
    <div class="card-hint" style="font-size:12px;color:var(--text3);position:absolute;bottom:12px">탭/클릭하면 정답 확인</div>
    <button class="tts-btn" ${ttsDisabled} onclick="event.stopPropagation();speak(queue[idx]&&queue[idx].w)">🔊</button>`;
  $('d-card').innerHTML=cardHtml;$('m-card').innerHTML=cardHtml;
  isRevealed=false;
}

// ════ Reveal ════
function reveal(){
  if(idx>=queue.length||isRevealed)return;
  isRevealed=true;
  const w=queue[idx];
  currentHighlights=new Set([...w.r].filter(ch=>/[ぁ-ゖ゙゚]/.test(ch)));
  ['d-card','m-card'].forEach(id=>{
    const card=document.getElementById(id);
    card.querySelectorAll('.reading-el,.meaning-el,.type-el').forEach(e=>e.style.display='block');
    const hint=card.querySelector('.card-hint');if(hint)hint.style.display='none';
    const tts=card.querySelector('.tts-btn');if(tts&&ttsOK)tts.classList.add('active');
  });
  $('d-reveal').style.display='none';
  $('d-know').style.display='inline-block';
  $('d-dont').style.display='inline-block';
  $('m-reveal').style.display='none';
  $('m-kana-panel').classList.add('open');
  $('m-action-row').style.display='grid';
  rebuildKana();
}
function onTap(side){if(!isRevealed)reveal();}

// ════ Navigation ════
function go(d){
  if(d>0)idx=Math.min(idx+1,queue.length);
  else idx=Math.max(idx-1,0);
  renderCard();
}
function mark(know){
  if(!isRevealed)return;
  const w=queue[idx];
  saveRecord(w,know);
  if(know)kn++;else dn++;
  go(1);
}

// ════ Shuffle / Level ════
function doShuffle(){
  if(searchQuery){handleSearch(searchQuery,'d');return;}
  queue=vocab.filter(v=>activeLv.has(v.lv)).sort(()=>Math.random()-.5);
  idx=0;kn=0;dn=0;updateStats();renderCard();
}
function toggleLv(lv,btn){
  if(activeLv.has(lv)){if(activeLv.size>1)activeLv.delete(lv);}
  else activeLv.add(lv);
  const cls=lv==='회화'?'kw':lv.toLowerCase();
  document.querySelectorAll(`.lv-btn.${cls}`).forEach(b=>b.classList.toggle('on',activeLv.has(lv)));
  if(!reviewMode)doShuffle();
}

// ════ Init ════
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
showKana('hira','d',null);showKana('hira','m',null);doShuffle();
</script>
</body>
</html>
